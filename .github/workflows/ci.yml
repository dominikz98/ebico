name: CI

on:
  push:
    branches: [main]
  pull_request:

# Nur der jeweils neueste Lauf pro Branch/PR; ältere werden abgebrochen.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET (aus global.json)
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      # NuGet-Cache über die Projekt-/CPM-Dateien verschlüsselt. Es werden
      # bewusst keine packages.lock.json verwendet (siehe
      # docs/development/solution-layout.md), daher der explizite actions/cache
      # statt der setup-dotnet-Cache-Option.
      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore EBICO.sln

      - name: Build (Release, keine neuen Warnungen)
        run: dotnet build EBICO.sln -c Release --no-restore

      - name: Test (+ Coverage)
        run: >-
          dotnet test EBICO.sln -c Release --no-build
          --collect:"XPlat Code Coverage"
          --results-directory ./TestResults
          --logger "trx;LogFileName=test-results.trx"

      - name: Upload Coverage-Artefakt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: '**/coverage.cobertura.xml'
          if-no-files-found: error

      - name: Upload Testergebnisse (TRX)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/*.trx'
          if-no-files-found: warn

  docs-link-check:
    name: Docs Link Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Offline: prüft relative Doku-Links (Docs-as-Code), ohne flakige
      # externe Requests (z. B. die vielen ebics.org-URLs). Externe Links
      # können später als nicht-blockierender Scheduled-Job dazukommen.
      - name: Link Checker (offline, relative Links)
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --no-progress --verbose "**/*.md"
          fail: true

  container-build:
    name: Container Build (Server)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Baut das Server-Container-Image (Issue #61). Build-only: kein Registry-Login/Push (das
      # gehört zur Publish-Pipeline, M9 / #62). Hält das Dockerfile grün, ohne Secrets zu brauchen.
      - name: Build Server-Image (build-only)
        run: docker build --build-arg PROJECT=EBICO.Server -t ebico-server:ci .

  pack:
    name: Pack (NuGet, build-only)
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET (aus global.json)
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      # Packt die veröffentlichten Bibliotheken EBICO.Core + EBICO.Connector (Issue #50) inkl.
      # README, XML-Doc, snupkg-Symbols, SourceLink und Lizenz-Metadaten. Die CalVer-BUILD-Komponente
      # kommt aus der Run-Nummer ({JAHR}.{MONAT}.{run_number}). Build-only: kein Registry-Push — das
      # Publizieren gehört zur Publish-Pipeline (M9 / #62). Analog zum container-build-Job hält das die
      # Pakete grün, ohne Secrets zu brauchen.
      - name: Pack EBICO.Core (Release)
        run: >-
          dotnet pack src/EBICO.Core/EBICO.Core.csproj
          -c Release -o ./artifacts
          -p:EbicoBuildNumber=${{ github.run_number }}

      - name: Pack EBICO.Connector (Release)
        run: >-
          dotnet pack src/EBICO.Connector/EBICO.Connector.csproj
          -c Release -o ./artifacts
          -p:EbicoBuildNumber=${{ github.run_number }}

      - name: Upload NuGet-Artefakt (nupkg + snupkg)
        uses: actions/upload-artifact@v4
        with:
          name: nuget
          path: ./artifacts/*
          if-no-files-found: error
